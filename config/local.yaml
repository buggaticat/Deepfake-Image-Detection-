data:
  dataset_name: "ComplexDataLab/OpenFake"
  subset: "core"
  data_root: "data"
  seed: 42
  buffer_size: 7000
  probabilities:
    real: 0.5
    fake: 0.5
  splits:
    train: 50000
    validation: 10000
    test: 10000

run_load_data:
  load_data_path: src/pipelines/load_data.py

preprocess:
  image_size: [224, 224]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  num_output_channels: 1
  model_name: "Qwen/Qwen2.5-VL-3B-Instruct"
  csv_path: 
    train: "metadata_train.csv"
    validation: "metadata_validation.csv"
    test: "metadata_test.csv"

dataset:
  batch_size: 32
  num_workers: 4
  clip_model_name: "openai/clip-vit-base-patch32"
  preprocessed_data_root: "preprocessed_data"
  
model:
  vit_model_name: "vit_base_patch16_224"
  efficientnet_model_name: "efficientnet_b4"
  dropout: 0.3
  fusion_hidden_size: 512

train:
  learning_rate: 0.0001
  weight_decay: 0.00001
  num_epochs: 20
  checkpoint_dir: "outputs/checkpoints"

evaluate:
  results_dir: "outputs/results"
  