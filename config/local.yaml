data:
  dataset_name: "ComplexDataLab/OpenFake"
  subset: "core"
  data_root: "data"
  seed: 42
  buffer_size: 7000
  probabilities:
    real: 0.5
    fake: 0.5
  splits:
    train: 50005
    validation: 10000
    test: 10000

run_load_data:
  data_root: "data"
  load_data_path: src/pipelines/load_data.py
  splits:
    train: 50005
    validation: 10000
    test: 10000

preprocess:
  image_size: [224, 224]
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  num_output_channels: 1
  data_root: "data"
  model_name: "Qwen/Qwen2.5-VL-3B-Instruct"
  device: "cpu"
  csv_path: 
    train: "metadata_train.csv"
    validation: "metadata_validation.csv"
    test: "metadata_test.csv"

dataset:
  batch_size: 32
  num_workers: 4
  csv_path: 
    train: "metadata_train.csv"
    validation: "metadata_validation.csv"
    test: "metadata_test.csv"
  clip_model_name: "openai/clip-vit-base-patch32"
  data_root: "data"
  device: "cpu"
  

  