data:
  dataset_name: "ComplexDataLab/OpenFake"
  subset: "core"
  data_root: "data"
  seed: 42
  buffer_size: 7000
  probabilities:
    real: 0.5
    fake: 0.5
  splits:
    train: 50000
    validation: 10000
    test: 10000

run_load_data:
  load_data_path: src/pipelines/load_data.py

preprocess:
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  num_output_channels: 1
  model_name: "Salesforce/blip-image-captioning-base"
  csv_path: 
    train: "metadata_train.csv"
    validation: "metadata_validation.csv"
    test: "metadata_test.csv"

dataset:
  batch_size: 16
  num_workers: 1
  clip_model_name: "openai/clip-vit-base-patch32"
  preprocessed_data_root: "preprocessed_data"
  
model:
  vit_model_name: "vit_base_patch16_224"
  efficientnet_model_name: "efficientnet_b4"
  dropout: 0.2793528348747948
  fusion_hidden_size: 256

train:
  learning_rate: 1.2015737314388302e-05
  weight_decay: 3.0469220532071625e-06
  num_epochs: 20
  checkpoint_dir: "outputs/checkpoints"

evaluate:
  results_dir: "outputs/results"
  
hyperparam_search:
  n_trials: 20
  n_epochs_per_trial: 2
  train_size: 10000
  val_size: 1000
  